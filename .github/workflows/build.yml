name: Build iOS IPA (Free)
on:
  workflow_dispatch: # Pour lancer le build à la main sur GitHub

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Link Node for Xcode
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Disable Code Signing for all targets
        run: |
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' {} +

      - name: Build IPA (Ad-Hoc / Discovery)
        run: |
          mkdir -p build
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Finalize IPA Package
        run: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build && zip -r eklectic.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eklectic-ios-ipa
          path: build/eklectic.ipa
